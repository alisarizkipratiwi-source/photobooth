<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Photo Booth Strip - Custom & Stiker Lucu</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Hero Menari (animasi) -->
        <div class="hero-dance" id="heroDance">
            <div class="hero-character" id="heroCharacter">🐟💃</div>
            <div class="hero-text">Ayo Hias Strip Fotomu!</div>
        </div>

        <!-- Dashboard Utama -->
        <div class="dashboard">
            <!-- Kiri: Editor Canvas -->
            <div class="editor-area">
                <div class="canvas-wrapper">
                    <canvas id="photo-strip-canvas" width="500" height="700"></canvas>
                </div>
                <div class="canvas-tools">
                    <button id="downloadBtn" class="btn primary"><i class="fas fa-download"></i> Simpan Strip</button>
                    <button id="clearCanvasBtn" class="btn warning"><i class="fas fa-trash-alt"></i> Bersihkan Semua</button>
                </div>
            </div>

            <!-- Kanan: Kontrol -->
            <div class="controls-area">
                <!-- Input Foto & Kamera -->
                <div class="control-section">
                    <h3><i class="fas fa-camera"></i> Ambil / Upload Foto</h3>
                    <div class="button-group">
                        <button id="openCameraBtn" class="btn secondary"><i class="fas fa-video"></i> Buka Kamera</button>
                        <button id="capturePhotoBtn" class="btn success" disabled><i class="fas fa-camera-retro"></i> Jepret Foto</button>
                        <input type="file" id="uploadPhotoInput" accept="image/*" style="display:none">
                        <button id="uploadPhotoBtn" class="btn secondary"><i class="fas fa-upload"></i> Upload Gambar</button>
                    </div>
                    <div id="video-container" style="display:none; margin-top:10px;">
                        <video id="videoFeed" autoplay playsinline muted style="width:100%; max-height:150px; background:#000;"></video>
                    </div>
                </div>

                <!-- Stiker Library (Default) -->
                <div class="control-section">
                    <h3><i class="fas fa-smile-wink"></i> Stiker Lucu</h3>
                    <div class="sticker-panel" id="defaultStickers">
                        <!-- Stiker default emoji akan diisi oleh JS -->
                    </div>
                </div>

                <!-- Stiker Custom (Upload) -->
                <div class="control-section">
                    <h3><i class="fas fa-images"></i> Stiker Custom</h3>
                    <input type="file" id="uploadStickerInput" accept="image/*" style="display:none">
                    <button id="addCustomStickerBtn" class="btn small"><i class="fas fa-plus-circle"></i> Upload Stiker Baru</button>
                    <div class="sticker-panel" id="customStickersPanel">
                        <!-- Stiker custom akan muncul di sini -->
                    </div>
                </div>

                <!-- Filter untuk Objek Aktif -->
                <div class="control-section">
                    <h3><i class="fas fa-magic"></i> Filter Foto (Pilih Objek)</h3>
                    <select id="filterSelect">
                        <option value="none">Tanpa Filter</option>
                        <option value="grayscale">Grayscale</option>
                        <option value="sepia">Sepia</option>
                        <option value="vintage">Vintage</option>
                        <option value="brightness">Brightness +30%</option>
                        <option value="contrast">Contrast +20%</option>
                        <option value="cartoon">Cartoon (Kontras Tinggi)</option>
                    </select>
                    <button id="applyFilterBtn" class="btn small">Terapkan ke Objek Terpilih</button>
                </div>

                <!-- Tema & Layout -->
                <div class="control-section">
                    <h3><i class="fas fa-palette"></i> Tema Strip</h3>
                    <div class="theme-buttons">
                        <button data-theme="aquarium" class="theme-btn">🐟 Akuarium</button>
                        <button data-theme="cowboy" class="theme-btn">🤠 Cowboy</button>
                        <button data-theme="cute" class="theme-btn">🎀 Imut & Lucu</button>
                    </div>
                </div>

                <!-- Tambah Teks -->
                <div class="control-section">
                    <h3><i class="fas fa-font"></i> Tambah Teks Lucu</h3>
                    <input type="text" id="teksInput" placeholder="Ketik teks...">
                    <button id="addTextBtn" class="btn small">Tambah ke Strip</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
